name: CI

on:
  push:
    branches: [ main, initial-release ]
  pull_request:
    branches: [ main, initial-release ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome Lint
        run: pnpm run lint

      - name: Run Svelte Diagnostics Check
        run: pnpm run check

      - name: Run Unit Tests
        run: pnpm run test

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run Playwright E2E Tests
        run: pnpm run e2e
